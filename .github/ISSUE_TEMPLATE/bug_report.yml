name: Bug report
description: Report a defect in a Tokens United platform so we can fix it.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail
        as you can — clear reproduction steps help us resolve issues faster.

        Our stack is Django 5 (Python 3.13) + Next.js 14 (TypeScript), PostgreSQL,
        TanStack Query, session auth and RBAC. Mentioning the affected area helps
        us route the issue to the right people.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including any error messages or screenshots.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the behaviour.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
      placeholder: I expected '...' to happen.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform is affected?
      options:
        - Backend / Django
        - Frontend / Next.js
        - API
        - Auth & Permissions
        - Billing
        - AI / Automation
        - Infrastructure / DevOps
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system and version where the issue occurred.
      placeholder: e.g. Chrome 126 / macOS 14.5 / app v2.3.1
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How serious is the impact of this bug?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have not included any secrets, credentials or sensitive data in this report.
          required: true
